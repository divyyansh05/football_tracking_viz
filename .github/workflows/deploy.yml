name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main  # This ensures deployment ONLY happens when changes hit the main branch

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1 # You can change this to your preferred Google Cloud region
  SERVICE_NAME: football-tracking-app # The name of your Cloud Run service
  GAR_LOCATION: us-central1
  REPOSITORY: football-tracking-repo
  IMAGE: football-tracking-app
  # The Cloud Storage bucket for match persistence
  GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Google Cloud Auth
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      # Configure Docker to use Google Artifact Registry
      - name: Configure Docker for GCP
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Docker Auth
        run: |-
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      # Build and Push the Docker Image
      - name: Build and Push Docker Image
        run: |-
          docker build -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}

      # Deploy to Cloud Run
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}
          env_vars: |
            STORAGE_MODE=gcs
            GCS_BUCKET_NAME=${{ env.GCS_BUCKET_NAME }}
          # Ensures the service is publicly accessible over the internet
          flags: '--allow-unauthenticated'

      - name: Show Deployed URL
        run: echo "App successfully deployed at ${{ steps.deploy.outputs.url }}"
